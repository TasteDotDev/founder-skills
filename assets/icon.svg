<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="ibg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </linearGradient>
    <linearGradient id="iglow" x1="20" y1="40" x2="108" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#ibg)"/>
  <!-- Slash -->
  <text x="22" y="92" font-family="ui-monospace, 'SF Mono', 'Fira Code', monospace" font-size="72" font-weight="900" fill="url(#iglow)">/</text>
  <!-- F -->
  <text x="52" y="92" font-family="ui-monospace, 'SF Mono', 'Fira Code', monospace" font-size="72" font-weight="900" fill="#f5f5f5">f</text>
  <!-- Subtle glow -->
  <circle cx="45" cy="70" r="40" fill="#f97316" opacity="0.06"/>
</svg>
