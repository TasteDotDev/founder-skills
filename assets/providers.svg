<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0f0f"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="320" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="40" y="36" font-family="ui-monospace, monospace" font-size="14" font-weight="bold" fill="#f5f5f5">Works with your AI agent</text>
  <text x="40" y="54" font-family="ui-monospace, monospace" font-size="11" fill="#71717a">One install. Instant access to 568 frameworks.</text>

  <!-- Claude Code -->
  <g transform="translate(40, 72)">
    <rect width="352" height="108" rx="10" fill="#1e1e2e" stroke="#8b5cf6" stroke-width="1" opacity="0.9"/>
    <rect x="16" y="14" width="28" height="28" rx="14" fill="#8b5cf6" opacity="0.2"/>
    <text x="24" y="34" font-family="ui-monospace, monospace" font-size="14" font-weight="bold" fill="#a78bfa">C</text>
    <text x="56" y="34" font-family="ui-monospace, monospace" font-size="14" font-weight="bold" fill="#f5f5f5">Claude Code</text>
    <rect x="16" y="50" width="320" height="24" rx="5" fill="#0f0f0f"/>
    <text x="24" y="66" font-family="ui-monospace, monospace" font-size="10" fill="#71717a">$</text>
    <text x="36" y="66" font-family="ui-monospace, monospace" font-size="10" fill="#a78bfa">claude install github:TasteDotDev/founder-skills</text>
    <text x="16" y="94" font-family="ui-monospace, monospace" font-size="10" fill="#71717a">Use:</text>
    <text x="50" y="94" font-family="ui-monospace, monospace" font-size="10" fill="#f97316">/founder</text>
    <text x="116" y="94" font-family="ui-monospace, monospace" font-size="10" fill="#f97316">/strategy</text>
    <text x="192" y="94" font-family="ui-monospace, monospace" font-size="10" fill="#f97316">/finance</text>
    <text x="260" y="94" font-family="ui-monospace, monospace" font-size="10" fill="#71717a">+ 13 more</text>
  </g>

  <!-- OpenAI Codex -->
  <g transform="translate(408, 72)">
    <rect width="352" height="108" rx="10" fill="#1e1e2e" stroke="#22c55e" stroke-width="1" opacity="0.9"/>
    <rect x="16" y="14" width="28" height="28" rx="14" fill="#22c55e" opacity="0.2"/>
    <text x="23" y="34" font-family="ui-monospace, monospace" font-size="14" font-weight="bold" fill="#4ade80">O</text>
    <text x="56" y="34" font-family="ui-monospace, monospace" font-size="14" font-weight="bold" fill="#f5f5f5">OpenAI Codex</text>
    <rect x="16" y="50" width="320" height="24" rx="5" fill="#0f0f0f"/>
    <text x="24" y="66" font-family="ui-monospace, monospace" font-size="10" fill="#4ade80">$skill-installer install founder-skills from</text>
    <text x="16" y="86" font-family="ui-monospace, monospace" font-size="10" fill="#71717a">Auto-activates on matching prompts</text>
    <text x="16" y="96" font-family="ui-monospace, monospace" font-size="10" fill="#71717a">Use:</text>
    <text x="50" y="96" font-family="ui-monospace, monospace" font-size="10" fill="#f97316">$founder</text>
    <text x="120" y="96" font-family="ui-monospace, monospace" font-size="10" fill="#f97316">$strategy</text>
    <text x="200" y="96" font-family="ui-monospace, monospace" font-size="10" fill="#f97316">$sales</text>
  </g>

  <!-- Gemini CLI -->
  <g transform="translate(40, 196)">
    <rect width="352" height="108" rx="10" fill="#1e1e2e" stroke="#3b82f6" stroke-width="1" opacity="0.9"/>
    <rect x="16" y="14" width="28" height="28" rx="14" fill="#3b82f6" opacity="0.2"/>
    <text x="23" y="34" font-family="ui-monospace, monospace" font-size="14" font-weight="bold" fill="#60a5fa">G</text>
    <text x="56" y="34" font-family="ui-monospace, monospace" font-size="14" font-weight="bold" fill="#f5f5f5">Gemini CLI</text>
    <rect x="16" y="50" width="320" height="24" rx="5" fill="#0f0f0f"/>
    <text x="24" y="66" font-family="ui-monospace, monospace" font-size="10" fill="#71717a">$</text>
    <text x="36" y="66" font-family="ui-monospace, monospace" font-size="10" fill="#60a5fa">gemini skills install ... --path skills</text>
    <text x="16" y="86" font-family="ui-monospace, monospace" font-size="10" fill="#71717a">Auto-suggests skills when your query matches</text>
    <text x="16" y="96" font-family="ui-monospace, monospace" font-size="10" fill="#71717a">Use:</text>
    <text x="50" y="96" font-family="ui-monospace, monospace" font-size="10" fill="#d4d4d8">Just ask naturally — Gemini picks the right skill</text>
  </g>

  <!-- Founder CLI -->
  <g transform="translate(408, 196)">
    <rect width="352" height="108" rx="10" fill="#1e1e2e" stroke="#f97316" stroke-width="1" opacity="0.9"/>
    <rect x="16" y="14" width="28" height="28" rx="14" fill="#f97316" opacity="0.2"/>
    <text x="22" y="34" font-family="ui-monospace, monospace" font-size="14" font-weight="bold" fill="#f97316">/f</text>
    <text x="56" y="34" font-family="ui-monospace, monospace" font-size="14" font-weight="bold" fill="#f5f5f5">Founder CLI</text>
    <text x="176" y="34" font-family="ui-monospace, monospace" font-size="10" fill="#71717a">any LLM</text>
    <rect x="16" y="50" width="320" height="24" rx="5" fill="#0f0f0f"/>
    <text x="24" y="66" font-family="ui-monospace, monospace" font-size="10" fill="#71717a">$</text>
    <text x="36" y="66" font-family="ui-monospace, monospace" font-size="10" fill="#f97316">npm i -g @taste.dev/founder</text>
    <text x="16" y="86" font-family="ui-monospace, monospace" font-size="10" fill="#71717a">Standalone terminal app · REPL + one-shot</text>
    <text x="16" y="96" font-family="ui-monospace, monospace" font-size="10" fill="#71717a">Use:</text>
    <text x="50" y="96" font-family="ui-monospace, monospace" font-size="10" fill="#d4d4d8">founder "how do I price my SaaS?"</text>
  </g>
</svg>
