name: Build multi-platform dist

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build dist
        run: python3 build.py

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: founder-skills-dist
          path: dist/

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build dist
        run: python3 build.py

      - name: Create tarball
        run: tar -czf founder-skills-dist.tar.gz -C dist .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: founder-skills-dist.tar.gz
          generate_release_notes: true
